<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700;900&family=Noto+Serif+SC:wght@400;700&family=Noto+Serif+KR:wght@400;700&family=Zen+Old+Mincho:wght@400;700&family=Cormorant+Garamond:wght@400;600;700&display=swap');
:root{--bg:#06060e;--bg2:#0c0c1a;--bg3:#12122a;--tx:#c8c8d4;--txd:#b0b0c8;--txb:#eeeef4;--seal:#7b2ff7;--trade:#f7a02f;--zen:#2f7bf7;--rev:#f72f2f;--bdr:#2ff77b;--gold:#c9a84c;--goldd:#8a7235;--r:10px}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif JP','Noto Serif SC','Noto Serif KR','Cormorant Garamond',serif;line-height:1.7;overflow-x:hidden;min-height:100vh}

/* LANG BAR */
.lang-bar{position:fixed;top:0;right:0;z-index:200;display:flex;gap:.2rem;padding:.5rem .8rem;background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border-bottom-left-radius:8px}
.lang-btn{padding:.2rem .6rem;border:1px solid rgba(255,255,255,.08);border-radius:4px;background:0 0;color:var(--txd);font-size:.65rem;cursor:pointer;transition:.2s;font-family:inherit}
.lang-btn:hover{border-color:var(--goldd);color:var(--tx)}.lang-btn.active{background:rgba(201,168,76,.15);border-color:var(--goldd);color:var(--gold)}

/* BACK BUTTON */
.back-btn{position:fixed;top:0;left:0;z-index:200;display:none;align-items:center;gap:.4rem;padding:.55rem 1rem;background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border:none;border-bottom-right-radius:8px;color:var(--gold);font-size:.75rem;cursor:pointer;font-family:inherit;transition:.2s;letter-spacing:.05em}
.back-btn:hover{background:rgba(201,168,76,.1)}.back-btn.show{display:flex}
.back-btn svg{width:16px;height:16px;stroke:var(--gold);fill:none;stroke-width:2}

/* HERO */
.hero{text-align:center;padding:3.5rem 1.5rem 2rem;position:relative}
.hero::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 600px 400px at 30% 30%,rgba(123,47,247,.06),transparent),radial-gradient(ellipse 500px 400px at 70% 50%,rgba(47,123,247,.04),transparent);pointer-events:none}
.hero-kanji{font-family:'Zen Old Mincho',serif;font-size:clamp(2.5rem,8vw,5rem);font-weight:700;color:transparent;background:linear-gradient(135deg,var(--gold),#f0dca0 40%,var(--goldd) 70%,var(--gold));-webkit-background-clip:text;background-clip:text;letter-spacing:.15em;line-height:1.2;position:relative;z-index:1}
.hero-sub{font-family:'Cormorant Garamond',serif;font-size:clamp(.6rem,2vw,.85rem);color:var(--goldd);letter-spacing:.5em;text-transform:uppercase;margin-top:.3rem;position:relative;z-index:1}
.hero-quote{font-size:clamp(.75rem,2vw,.95rem);color:#d8d8ee;max-width:500px;margin:1.2rem auto 0;font-weight:400;line-height:2;position:relative;z-index:1;text-shadow:0 1px 8px rgba(0,0,0,.8)}

/* STATS */
.stats{display:flex;justify-content:center;gap:1.5rem;padding:1.2rem 1rem;border-top:1px solid rgba(201,168,76,.08);border-bottom:1px solid rgba(201,168,76,.08);flex-wrap:wrap}
.stat{text-align:center}.stat b{font-family:'Zen Old Mincho',serif;font-size:1.4rem;color:var(--gold);display:block}.stat span{font-size:.6rem;color:var(--txd);letter-spacing:.15em}
.dice-btn{display:flex;flex-direction:column;align-items:center;gap:.2rem;background:none;border:1px solid rgba(201,168,76,.2);border-radius:10px;padding:.4rem .9rem;cursor:pointer;transition:.3s;font-family:inherit;color:var(--txd);letter-spacing:.1em;position:relative;overflow:hidden}
.dice-btn:hover{border-color:var(--goldd);background:rgba(201,168,76,.06);color:var(--gold)}
.dice-btn:hover .dice-icon{animation:diceRoll .4s ease}
.dice-icon{font-size:1.4rem;display:block;line-height:1}
.dice-label{font-size:.55rem;letter-spacing:.12em;white-space:nowrap}
@keyframes diceRoll{0%{transform:rotate(0) scale(1)}30%{transform:rotate(-20deg) scale(1.2)}70%{transform:rotate(15deg) scale(1.1)}100%{transform:rotate(0) scale(1)}}

/* NAV MODE SELECTOR */
.nav-mode{display:flex;justify-content:center;gap:.8rem;padding:1.5rem 1rem .5rem;flex-wrap:wrap}
.nav-mode-btn{padding:.6rem 1.5rem;border:1px solid rgba(255,255,255,.06);border-radius:30px;background:var(--bg2);color:var(--txd);font-size:.8rem;cursor:pointer;transition:.3s;font-family:inherit;letter-spacing:.08em}
.nav-mode-btn:hover{border-color:var(--goldd);color:var(--tx)}
.nav-mode-btn.active{background:rgba(201,168,76,.12);border-color:var(--goldd);color:var(--gold)}
.pop-section{margin-bottom:2.5rem}
.pop-section-title{font-size:.95rem;color:var(--gold);letter-spacing:.12em;border-left:2px solid var(--gold);padding-left:.8rem;margin-bottom:.3rem}
.pop-section-subtitle{font-size:.7rem;color:var(--txd);margin-bottom:1rem;padding-left:1rem}
.pop-item{display:flex;align-items:flex-start;gap:.9rem;padding:.7rem .9rem;border-radius:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.04);margin-bottom:.5rem;cursor:pointer;transition:.25s}
.pop-item:hover{background:rgba(201,168,76,.06);border-color:rgba(201,168,76,.2)}
.pop-thumb{width:56px;height:56px;border-radius:6px;object-fit:cover;flex-shrink:0;background:rgba(255,255,255,.04)}
.pop-rank{font-size:1.1rem;font-weight:700;color:var(--goldd);min-width:1.8rem;padding-top:.1rem}
.pop-rank.r1{color:#ffd700}.pop-rank.r2{color:#c0c0c0}.pop-rank.r3{color:#cd7f32}
.pop-info{flex:1}
.pop-name{font-size:.9rem;color:var(--tx);margin-bottom:.2rem}
.pop-name .pop-tag{font-size:.65rem;color:var(--txd);margin-left:.5rem;background:rgba(255,255,255,.06);padding:.1rem .4rem;border-radius:4px}
.pop-desc{font-size:.72rem;color:var(--txd);line-height:1.5}
.pop-arrow{color:var(--goldd);font-size:.9rem;align-self:center;opacity:.5}
.pop-divider{height:1px;background:rgba(255,255,255,.05);margin:2rem 0}

/* FILTER BAR */
.filter-bar{display:flex;justify-content:center;gap:.3rem;padding:.8rem 1rem;flex-wrap:wrap;max-width:900px;margin:0 auto}
.filter-chip{padding:.3rem .8rem;border:1px solid rgba(255,255,255,.05);border-radius:20px;background:rgba(255,255,255,.02);color:var(--txd);font-size:.65rem;cursor:pointer;transition:.2s;font-family:inherit}
.filter-chip:hover{border-color:rgba(201,168,76,.3);color:var(--tx)}
.filter-chip.active{background:rgba(201,168,76,.12);border-color:var(--goldd);color:var(--gold)}
.filter-chip[data-wl="封印線"].active{background:rgba(123,47,247,.15);border-color:rgba(123,47,247,.4);color:#c084fc}
.filter-chip[data-wl="商都線"].active{background:rgba(247,160,47,.15);border-color:rgba(247,160,47,.4);color:#fcd084}
.filter-chip[data-wl="静律線"].active{background:rgba(47,123,247,.15);border-color:rgba(47,123,247,.4);color:#84c0fc}
.filter-chip[data-wl="変革線"].active{background:rgba(247,47,47,.15);border-color:rgba(247,47,47,.4);color:#fc8484}
.filter-chip[data-wl="境界線"].active{background:rgba(47,247,123,.15);border-color:rgba(47,247,123,.4);color:#84fcc0}

/* SEARCH */
.search-wrap{max-width:400px;margin:.5rem auto;padding:0 1rem}
.search-input{width:100%;padding:.6rem 1rem;background:var(--bg2);border:1px solid rgba(255,255,255,.05);border-radius:25px;color:var(--txb);font-family:inherit;font-size:.8rem;outline:0;transition:.3s}
.search-input::placeholder{color:var(--txd)}.search-input:focus{border-color:rgba(201,168,76,.3)}

/* THUMBNAIL GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:.6rem;padding:.8rem 1rem;max-width:1200px;margin:0 auto}
.grid.region-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1rem}
.grid.wl-grid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.8rem}

/* CARD */
.card{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.04);aspect-ratio:3/4;background:var(--bg2)}
.card:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.2);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.card-img{width:100%;height:100%;object-fit:cover;transition:.3s}
.card:hover .card-img{transform:scale(1.05)}
.card-overlay{position:absolute;bottom:0;left:0;right:0;padding:.8rem .6rem .6rem;background:linear-gradient(transparent,rgba(6,6,14,.92) 40%)}
.card-pref{font-family:'Zen Old Mincho',serif;font-size:1.1rem;color:var(--txb);font-weight:700}
.card-pref-sub{font-size:.6rem;color:var(--txd);font-family:'Cormorant Garamond',serif}
.card-wl{display:inline-flex;align-items:center;gap:.25rem;font-size:.55rem;color:var(--txd);margin-top:.25rem;padding:.15rem .5rem;background:rgba(255,255,255,.05);border-radius:12px}
.card-wl .dot{width:5px;height:5px;border-radius:50%}
.card-king{font-size:.55rem;color:var(--txd);margin-top:.2rem;opacity:.7}

/* FALLBACK IMAGE (gradient placeholder) */
.card-fallback{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:2rem;color:rgba(255,255,255,.08)}

/* REGION CARD (larger) */
.rcard{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.04);aspect-ratio:16/9;background:var(--bg2);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.5rem}
.rcard:hover{transform:translateY(-3px);border-color:rgba(201,168,76,.2);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.rcard-name{font-family:'Zen Old Mincho',serif;font-size:clamp(1.2rem,3vw,1.8rem);color:var(--txb);font-weight:700;letter-spacing:.1em}
.rcard-sub{font-size:.7rem;color:var(--txd)}
.rcard-count{font-size:.65rem;color:var(--goldd);margin-top:.3rem}
.rcard::before{content:'';position:absolute;inset:0;opacity:.15;pointer-events:none}

/* WORLD LINE CARD */
.wlcard{position:relative;border-radius:var(--r);overflow:hidden;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.04);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:.4rem}
.wlcard:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,0,0,.4)}
.wlcard-name{font-family:'Zen Old Mincho',serif;font-size:1.6rem;color:var(--txb);font-weight:700;letter-spacing:.15em}
.wlcard-en{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase}
.wlcard-count{font-size:.6rem;color:var(--txd);margin-top:.2rem}

/* SECTION HEADERS */
.section-title{max-width:1200px;margin:1.5rem auto .5rem;padding:0 1rem;display:flex;align-items:center;gap:.8rem}
.section-title h2{font-family:'Zen Old Mincho',serif;font-size:clamp(1rem,3vw,1.4rem);color:var(--txb);font-weight:700;letter-spacing:.1em}
.section-title .badge{font-size:.6rem;color:var(--txd);background:var(--bg2);padding:.2rem .5rem;border-radius:15px}

/* BREADCRUMB */
.breadcrumb{max-width:1200px;margin:.5rem auto 0;padding:0 1rem;font-size:.7rem;color:var(--txd)}
.breadcrumb span{cursor:pointer;transition:.2s}.breadcrumb span:hover{color:var(--gold)}
.breadcrumb .sep{margin:0 .4rem;opacity:.4}

/* FOOTER */
.footer{text-align:center;padding:3rem 2rem;border-top:1px solid rgba(201,168,76,.08);margin-top:2rem}
.footer-quote{font-family:'Zen Old Mincho',serif;font-size:clamp(.9rem,2.5vw,1.3rem);color:var(--gold);letter-spacing:.15em;margin-bottom:1.5rem}
.footer-meta{font-size:.6rem;color:var(--txd);letter-spacing:.2em;line-height:2}

/* VIEW TRANSITIONS */
.view{display:none;animation:viewIn .4s ease-out}.view.active{display:block}
@keyframes viewIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

/* COLOR HELPERS */
.wl-seal{--wc:var(--seal)}.wl-trade{--wc:var(--trade)}.wl-zen{--wc:var(--zen)}.wl-rev{--wc:var(--rev)}.wl-bdr{--wc:var(--bdr)}

/* MOBILE */
@media(max-width:640px){
.grid{grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:.4rem;padding:.5rem .5rem}
.grid.region-grid{grid-template-columns:1fr}
.grid.wl-grid{grid-template-columns:repeat(2,1fr)}
.card-pref{font-size:.9rem}.card-overlay{padding:.5rem .4rem .4rem}
.nav-mode{gap:.4rem;padding:1rem .5rem .3rem}.nav-mode-btn{padding:.5rem 1rem;font-size:.7rem}
.filter-bar{gap:.2rem;padding:.5rem}.filter-chip{padding:.25rem .6rem;font-size:.6rem}
.hero{padding:3rem 1rem 1.5rem}.stats{gap:1rem;padding:1rem}
}

/* ═══ MY PAGE ═══ */
.card-badges{position:absolute;top:.4rem;right:.4rem;display:flex;gap:.25rem;z-index:5}
.card-read-badge{background:rgba(47,247,123,.85);border-radius:50%;width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:.6rem;backdrop-filter:blur(4px)}
.card-fav-btn{background:rgba(6,6,14,.7);border:none;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:.7rem;cursor:pointer;transition:.2s;backdrop-filter:blur(4px)}
.card-fav-btn:hover{background:rgba(247,160,47,.3);transform:scale(1.2)}
.card-fav-btn.active{background:rgba(247,160,47,.5)}
.mypage-wrap{max-width:900px;margin:0 auto;padding:1rem 1.2rem 4rem}
.my-hero{text-align:center;padding:1.5rem 0 1rem;border-bottom:1px solid rgba(201,168,76,.1);margin-bottom:1.5rem}
.my-hero-icon{font-size:2.5rem;margin-bottom:.5rem}
.my-hero-name{font-family:'Zen Old Mincho',serif;font-size:1.1rem;color:var(--gold);letter-spacing:.15em}
.my-stats{display:flex;justify-content:center;gap:1.5rem;flex-wrap:wrap;margin-top:1rem}
.my-stat{text-align:center;padding:.6rem 1rem;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.05);border-radius:10px;min-width:80px}
.my-stat b{display:block;font-family:'Zen Old Mincho',serif;font-size:1.5rem;color:var(--gold)}
.my-stat span{font-size:.55rem;color:var(--txd);letter-spacing:.1em}
.my-progress-wrap{margin:1.5rem 0}
.my-progress-bar{height:6px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;margin:.4rem 0}
.my-progress-fill{height:100%;background:linear-gradient(90deg,var(--seal),var(--goldd));border-radius:3px;transition:width .6s ease}
.my-section{margin:2rem 0}
.my-section-head{font-size:.8rem;color:var(--gold);letter-spacing:.15em;border-left:2px solid var(--gold);padding-left:.7rem;margin-bottom:.8rem;display:flex;align-items:center;justify-content:space-between}
.my-section-head a{font-size:.65rem;color:var(--txd);text-decoration:none;cursor:pointer;transition:.2s}
.my-section-head a:hover{color:var(--gold)}
.my-empty{color:var(--txd);font-size:.75rem;text-align:center;padding:1.5rem;background:rgba(255,255,255,.02);border-radius:8px;border:1px dashed rgba(255,255,255,.06)}
/* 旅マップ (47県グリッド) */
.my-prefmap{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;padding:.8rem;background:rgba(255,255,255,.02);border-radius:12px;border:1px solid rgba(255,255,255,.04)}
.my-pref-cell{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:.55rem;font-weight:700;cursor:pointer;transition:.25s;border:1px solid rgba(255,255,255,.06);color:rgba(255,255,255,.3);background:rgba(255,255,255,.02);font-family:'Zen Old Mincho',serif}
.my-pref-cell.visited{color:rgba(255,255,255,.9);border-color:rgba(201,168,76,.4)}
.my-pref-cell.visited:hover{transform:scale(1.15);box-shadow:0 0 12px rgba(201,168,76,.3)}
.my-tab-wrap{display:flex;gap:.3rem;margin-bottom:.8rem}
.my-tab{padding:.3rem .8rem;border:1px solid rgba(255,255,255,.06);border-radius:15px;background:none;color:var(--txd);font-size:.7rem;cursor:pointer;transition:.2s;font-family:inherit}
.my-tab.active{background:rgba(201,168,76,.12);border-color:var(--goldd);color:var(--gold)}
.my-mypage-btn{display:flex;flex-direction:column;align-items:center;gap:.15rem;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:10px;padding:.4rem .9rem;cursor:pointer;transition:.3s;font-family:inherit;color:var(--txd);letter-spacing:.08em}
.my-mypage-btn:hover{border-color:var(--goldd);background:rgba(201,168,76,.06);color:var(--gold)}
.my-mypage-icon{font-size:1.3rem;line-height:1}
.my-mypage-label{font-size:.55rem;letter-spacing:.1em}

/* ── GLOBAL FLOATING BUTTONS ── */
.global-fab{position:fixed;right:.8rem;bottom:4.5rem;z-index:150;display:flex;flex-direction:column;gap:.5rem}
.fab-btn{width:48px;height:48px;border-radius:50%;border:1px solid rgba(201,168,76,.25);background:rgba(6,6,14,.92);backdrop-filter:blur(10px);display:flex;align-items:center;justify-content:center;font-size:1.2rem;cursor:pointer;transition:.3s;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.fab-btn:hover{border-color:var(--goldd);background:rgba(201,168,76,.12);transform:scale(1.1)}
.fab-btn.fav-active{background:rgba(247,160,47,.2);border-color:rgba(247,160,47,.5)}
.fab-tooltip{position:absolute;right:56px;background:rgba(6,6,14,.95);border:1px solid rgba(255,255,255,.08);border-radius:6px;padding:.3rem .6rem;font-size:.65rem;color:var(--txd);white-space:nowrap;pointer-events:none;opacity:0;transition:.2s}
.fab-btn:hover .fab-tooltip{opacity:1}
@media(min-width:641px)and(max-width:1024px){
.grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr))}
}

/* ── INTRO OVERLAY ── */
/* ── MAP IN HERO ── */
.hero-map-wrap{
  position:relative;
  width:min(340px,70vw);
  margin:1.5rem auto 0;
}
.hero-map-img{
  width:100%;
  filter:drop-shadow(0 0 18px rgba(201,168,76,.18)) brightness(0.85);
  mix-blend-mode:lighten;
}
.hero-kanji,.hero-sub,.hero-quote{opacity:1}
</style>
</head>
<body>

<!-- LANG -->
<div class="lang-bar">
<button class="lang-btn active" onclick="setLang('ja')">日本語</button>
<button class="lang-btn" onclick="setLang('en')">EN</button>
<button class="lang-btn" onclick="setLang('zh')">中文</button>
<button class="lang-btn" onclick="setLang('ko')">한국</button>
</div>

<!-- BACK -->
<button class="back-btn" id="backBtn" onclick="goBack()">
<svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
<span data-i18n="back"></span>
</button>

<!-- GLOBAL FLOATING BUTTONS -->
<div class="global-fab" id="globalFab">
  <button class="fab-btn" id="fabMypage" onclick="openMyPage()" title="マイページ">

function updateFavFab(){

  const isFav=MP.isPrefFav(_currentFabPref);

  const tip=btn.querySelector('.fab-tooltip');
  if(tip)tip.textContent=isFav?'お気に入り済み':'お気に入りに追加';

}

// ═══ MY PAGE DATA (localStorage) ═══
const MP={
  key:'wk_my_',
  get reads(){return JSON.parse(localStorage.getItem(this.key+'reads')||'{}')},
  get favs(){return JSON.parse(localStorage.getItem(this.key+'favs')||'[]')},
  get prefFavs(){return JSON.parse(localStorage.getItem(this.key+'prefavs')||'[]')},
  get hist(){return JSON.parse(localStorage.getItem(this.key+'hist')||'[]')},
  markRead(pref,wl){const d=this.reads;const k=pref+'|'+wl;d[k]=(d[k]||0)+1;localStorage.setItem(this.key+'reads',JSON.stringify(d))},
  toggleFav(pref,wl){const f=this.favs,k=pref+'|'+wl,i=f.indexOf(k);if(i>=0)f.splice(i,1);else f.unshift(k);localStorage.setItem(this.key+'favs',JSON.stringify(f));return i<0},
  togglePrefFav(pref){const f=this.prefFavs,i=f.indexOf(pref);if(i>=0)f.splice(i,1);else f.unshift(pref);localStorage.setItem(this.key+'prefavs',JSON.stringify(f));return i<0},
  addHist(pref,wl){const h=this.hist,k=pref+'|'+wl+'|'+Date.now();h.unshift(k);localStorage.setItem(this.key+'hist',JSON.stringify(h.slice(0,100)))},
  isRead(pref,wl){return !!(this.reads[pref+'|'+wl])},
  isFav(pref,wl){return this.favs.includes(pref+'|'+wl)},
  isPrefFav(pref){return this.prefFavs.includes(pref)},
  get readCount(){return Object.keys(this.reads).length},
  get prefVisited(){return [...new Set(Object.keys(this.reads).map(k=>k.split('|')[0]))]},
};

// ═══ CARD HTML ═══
function storyCard(pref,wl,wlName,showPref=true){
const _rch=(Math.floor(Math.random()*5)+1);
const img=imgPath(pref,wl,_rch);
const fb1=imgFB1(pref,wl,_rch);
const fb2=imgFB2(pref,wl,_rch);
const sub=psub(pref);
const isRead=MP.isRead(pref,wl);
const isFav=MP.isFav(pref,wl);
const key=`${pref}||${wl}`;
return `<div class="card" onclick="openStory('${pref}','${wl}')">
<img class="card-img" src="${img}" data-fb1="${fb1}" data-fb2="${fb2}" onerror="if(this.dataset.fb1){var s=this.dataset.fb1;this.dataset.fb1='';this.src=s}else if(this.dataset.fb2){var s=this.dataset.fb2;this.dataset.fb2='';this.src=s}else{this.style.display='none';this.nextElementSibling.style.display='flex'}" loading="lazy">
<div class="card-fallback" style="display:none;background:${WL_GRAD[wl]}">${pref.charAt(0)}</div>
<div class="card-badges">
  ${isRead?`<div class="card-read-badge" title="既読">✓</div>`:''}
  <button class="card-fav-btn${isFav?' active':''}" onclick="event.stopPropagation();toggleFavBtn(this,'${pref}','${wl}')" title="お気に入り">${isFav?'★':'☆'}</button>
</div>
<div class="card-overlay">
${showPref?`<div class="card-pref">${pref}</div>${sub?`<div class="card-pref-sub">${sub}</div>`:''}`:``}
<div class="card-wl"><span class="dot" style="background:${WL_COLORS[wl]}"></span>${wn(wl)}${wlName?` · ${wlName}`:''}</div>
${showPref?'':`<div class="card-pref" style="font-size:.9rem;margin-top:.15rem">${pref}</div>${sub?`<div class="card-pref-sub">${sub}</div>`:''}`}
</div></div>`;
}

function openStory(pref,wl){
  MP.markRead(pref,wl);
  MP.addHist(pref,wl);
  window.open(encodeURI(`worldkings_output/${pref}_${wl}/index.html`)+(CL!=='ja'?'?lang='+CL:''),'_blank');
}

function toggleFavBtn(btn,pref,wl){
  const added=MP.toggleFav(pref,wl);
  btn.textContent=added?'★':'☆';
  btn.classList.toggle('active',added);
  // 読み済みバッジを兄として追加／更新
  const badges=btn.parentElement;
  const old=badges.querySelector('.card-read-badge');
  if(MP.isRead(pref,wl)&&!old){
    badges.insertAdjacentHTML('afterbegin','<div class="card-read-badge" title="既読">✓</div>');
  }
}

function renderMyPage(){
  const reads=MP.reads;
  const favs=MP.favs;
  const hist=MP.hist;
  const readCount=MP.readCount;
  const visitedPrefs=MP.prefVisited;
  const totalStories=235;
  const pct=Math.round(readCount/totalStories*100);

  // WL progress
  const wlCounts={};
  WLS.forEach(w=>{wlCounts[w]=Object.keys(reads).filter(k=>k.endsWith('_'+w)).length});

  // Prefecture color map (visited → warm)
  const allP=allPrefs();
  const prefCells=allP.map(p=>{
    const cnt=WLS.filter(w=>MP.isRead(p.n,w)).length;
    const bg=cnt===5?'rgba(201,168,76,.7)':cnt>0?`rgba(201,168,76,${.1+cnt*.12})`:'rgba(255,255,255,.03)';
    const border=cnt>0?'rgba(201,168,76,.4)':'rgba(255,255,255,.06)';
    return `<div class="my-pref-cell${cnt>0?' visited':''}" style="background:${bg};border-color:${border}" title="${p.n}（${cnt}/5）" onclick="openPrefFromMyPage('${p.n}')">${p.n.charAt(0)}<br><span style="font-size:.4rem;opacity:.6">${cnt}/5</span></div>`;
  }).join('');

  // Fav cards (individual stories)
  let favHtml='';
  if(favs.length===0){
    favHtml=`<div class="my-empty">物語カードの ☆ ボタンで追加できます。</div>`;
  } else {
    favHtml=`<div class="grid" style="padding:0">`;
    for(const k of favs.slice(0,20)){
      const idx=k.indexOf('|');
      if(idx<0)continue;
      const pref=k.slice(0,idx),wl=k.slice(idx+1);
      if(pref&&wl)favHtml+=storyCard(pref,wl,'');
    }
    favHtml+='</div>';
  }

  // Pref favs (♡ FABで追加した県単位お気に入り)

    prefFavHtml=`<div class="my-empty">県詳細ページの ♡ ボタンで県をまるごと追加できます。</div>`;
  } else {
    prefFavHtml=`<div style="display:flex;flex-wrap:wrap;gap:.5rem;padding:.3rem 0">`;

      prefFavHtml+=`<button onclick="openPrefFromMyPage('${pref}')" style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:.35rem .9rem;color:var(--gold);font-size:.8rem;cursor:pointer;font-family:inherit;transition:.2s" onmouseover="this.style.background='rgba(201,168,76,.2)'" onmouseout="this.style.background='rgba(201,168,76,.1)'">${pref}</button>`;
    }
    prefFavHtml+='</div>';
  }

  // History list
  let histHtml='';
  if(hist.length===0){
    histHtml=`<div class="my-empty">読んだ物語がここに記録されます。</div>`;

function openPrefFromMyPage(name){
  const allP=allPrefs();
  const p=allP.find(x=>x.n===name);if(!p)return;
  history_stack.push(()=>openMyPage());
  _currentFabPref=name;_currentFabWL=null;
  document.getElementById('bcPref').innerHTML=`<span onclick="showView('v-home')">TOP</span><span class="sep">›</span><span onclick="openMyPage()" style="cursor:pointer">マイページ</span><span class="sep">›</span>${name}`;
  let h='';for(const wl of WLS)h+=storyCard(name,wl,p.wl[wl]);
  document.getElementById('stPref').innerHTML=`<h2>${name}</h2>`;

// ═══ MODE: ALL ═══
function renderAll(){
document.getElementById('allMode').style.display='';
document.getElementById('popularMode').style.display='none';
document.getElementById('regionMode').style.display='none';
document.getElementById('wlMode').style.display='none';
// filter bar
let fb=`<button class="filter-chip active" onclick="setFilter('')" data-i18n="all">${t('all')}</button>`;
for(const rk of REGIONS_ORDER)fb+=`<button class="filter-chip" data-region="${rk}" onclick="setFilter('region','${rk}')">${rn(rk)}</button>`;
fb+=`<span style="width:1px;height:20px;background:rgba(255,255,255,.06);margin:0 .3rem"></span>`;
for(const w of WLS)fb+=`<button class="filter-chip" data-wl="${w}" onclick="setFilter('wl','${w}')"><span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${WL_COLORS[w]};margin-right:3px"></span>${wn(w)}</button>`;
document.getElementById('filterBar').innerHTML=fb;
renderAllGrid();
}

function setFilter(type,val){
filterWL=type==='wl'?val:'';filterRegion=type==='region'?val:'';
document.querySelectorAll('.filter-chip').forEach(c=>{
c.classList.remove('active');
if(!type&&!c.dataset.wl&&!c.dataset.region)c.classList.add('active');
if(type==='wl'&&c.dataset.wl===val)c.classList.add('active');
if(type==='region'&&c.dataset.region===val)c.classList.add('active');
});
renderAllGrid();
}

function renderAllGrid(){
const prefs=allPrefs();let h='';
const q=(document.getElementById('searchInput').value||'').trim().toLowerCase();
for(const p of prefs){
if(filterRegion&&p.region!==filterRegion)continue;
if(q&&!p.n.includes(q)&&!(psub(p.n).toLowerCase().includes(q)))continue;
for(const[wl,wlName]of Object.entries(p.wl)){
if(filterWL&&wl!==filterWL)continue;
h+=storyCard(p.n,wl,wlName);
}}
document.getElementById('allGrid').innerHTML=h||`<div style="grid-column:1/-1;text-align:center;color:var(--txd);padding:3rem">No results</div>`;
}

// ═══ MODE SWITCH ═══
function setMode(m){
mode=m;
document.querySelectorAll('.nav-mode-btn').forEach((b,i)=>{
b.classList.toggle('active',['all','popular','region','wl'][i]===m);
});
document.getElementById('allMode').style.display='none';
document.getElementById('popularMode').style.display='none';
document.getElementById('regionMode').style.display='none';
document.getElementById('wlMode').style.display='none';
if(m==='all')renderAll();
else if(m==='popular')renderPopular();
else if(m==='region')renderRegions();
else renderWLs();
}

function openPref(pref){
history_stack.push(()=>{showView('v-home');setMode('popular')});
_currentFabPref=pref;_currentFabWL=null;
showView('v-pref');
const sub=psub(pref);
document.getElementById('bcPref').innerHTML=`<span onclick="showView('v-home')">TOP</span><span class="sep">›</span><span onclick="setMode('popular');showView('v-home')" style="cursor:pointer">人気順</span><span class="sep">›</span><span>${pref}</span>`;
document.getElementById('stPref').innerHTML=`<h2>${pref}${sub?` <small style="font-size:.6em;color:var(--txd)">${sub}</small>`:''}</h2><span class="badge">5 世界線</span>`;
let h='';
for(const rk of REGIONS_ORDER){
  const pr=RD[rk].find(p=>p.n===pref);
  if(pr){for(const[wl,wlName]of Object.entries(pr.wl)){h+=storyCard(pref,wl,wlName,false)}}
}
document.getElementById('prefDetailGrid').innerHTML=h||`<div style="color:var(--txd);padding:2rem">Not found</div>`;
}

let h='';
for(const sec of secs){
h+=`<div class="pop-section"><div class="pop-section-title">${sec.title}</div><div class="pop-section-subtitle">${sec.subtitle}</div>`;
for(const item of sec.items){
const rc=typeof item.rank==='number'?['','r1','r2','r3'][item.rank]||'':'';
const rankStr=typeof item.rank==='number'?item.rank+rs:item.rank;
const rwl=WLS[Math.floor(Math.random()*WLS.length)];
const rch=String(Math.floor(Math.random()*5)+1).padStart(2,'0');
const rthumb=encodeURI(`worldkings_output/${item.pref}_${rwl}/thumbs/chapter_${rch}.webp`);
const rfb=encodeURI(`worldkings_output/${item.pref}_${rwl}/images/chapter_${rch}.webp`);
h+=`<div class="pop-item" onclick="openPref('${item.pref}')">
<img class="pop-thumb" src="${rthumb}" onerror="this.src='${rfb}';this.onerror=function(){this.style.background='${WL_GRAD[rwl]}';this.style.opacity='.5'}" loading="lazy">
<div class="pop-rank ${rc}">${rankStr}</div>
<div class="pop-info"><div class="pop-name">${item.spot}<span class="pop-tag">${rl(item.pref)}</span></div><div class="pop-desc">${item.desc}</div></div>
</div>`;
}
h+=`</div><div class="pop-divider"></div>`;
}
document.getElementById('popularContent').innerHTML=h;
