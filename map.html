<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=3.0">
<title>Misty Japan ── 世界王 Map</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Zen+Old+Mincho:wght@400;700&family=Cormorant+Garamond:wght@400;600&display=swap');
:root{--bg:#06060e;--bg2:#0c0c1a;--bg3:#161630;--tx:#c8c8d4;--txd:#5a5a72;--txb:#eeeef4;--seal:#7b2ff7;--trade:#f7a02f;--zen:#2f7bf7;--rev:#f72f2f;--bdr:#2ff77b;--gold:#c9a84c;--goldd:#8a7235}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Noto Serif JP','Cormorant Garamond',serif;overflow-x:hidden;min-height:100vh}

/* TOP BAR */
.topbar{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;justify-content:space-between;align-items:center;padding:.5rem .8rem;background:rgba(6,6,14,.92);backdrop-filter:blur(12px);border-bottom:1px solid rgba(201,168,76,.06)}
.topbar-left{display:flex;align-items:center;gap:.6rem}
.topbar-left a{color:var(--gold);text-decoration:none;font-size:.75rem;display:flex;align-items:center;gap:.3rem;opacity:.8;transition:.2s}
.topbar-left a:hover{opacity:1}
.topbar-left a svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2}
.topbar-title{font-family:'Zen Old Mincho',serif;font-size:.85rem;color:var(--txb);letter-spacing:.1em}
.lang-bar{display:flex;gap:.15rem}
.lang-btn{padding:.15rem .5rem;border:1px solid rgba(255,255,255,.06);border-radius:3px;background:0 0;color:var(--txd);font-size:.6rem;cursor:pointer;transition:.2s;font-family:inherit}
.lang-btn:hover{color:var(--tx)}.lang-btn.active{background:rgba(201,168,76,.12);border-color:var(--goldd);color:var(--gold)}

/* MAP CONTAINER */
.map-wrap{position:relative;width:100%;max-width:800px;margin:3.5rem auto 0;padding:1rem;aspect-ratio:7/10}
.map-inner{position:relative;width:100%;height:100%}

/* JAPAN MAP IMAGE OVERLAY */
.map-bg-img{
  position:absolute;
  top:var(--map-top,-8%);
  left:var(--map-left,-18%);
  width:var(--map-w,136%);
  height:auto;
  opacity:.18;
  pointer-events:none;
  filter:brightness(1.2) contrast(1.1);
  mix-blend-mode:screen;
  z-index:1;
  transition:top .1s,left .1s,width .1s;
}

/* TUNE PANEL */
#tune-panel{
  position:fixed;top:3rem;left:0;right:0;z-index:300;
  background:rgba(6,6,14,.97);border-bottom:1px solid rgba(201,168,76,.2);
  padding:.6rem 1rem;font-size:.65rem;color:var(--txd);
  display:none;flex-wrap:wrap;gap:.5rem 1.2rem;align-items:center;
  font-family:monospace;
}
#tune-panel label{display:flex;align-items:center;gap:.3rem}
#tune-panel input[type=range]{width:90px;accent-color:var(--gold)}
#tune-panel span{min-width:3em;color:var(--gold)}
#tune-toggle{
  position:fixed;top:2.8rem;right:.5rem;z-index:302;
  background:rgba(201,168,76,.15);border:1px solid rgba(201,168,76,.4);
  border-radius:6px;padding:.3rem .7rem;font-size:.65rem;color:var(--gold);
  cursor:pointer;font-family:monospace;letter-spacing:.05em;
}

/* PREFECTURE NODE */
.pref-node{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:10;transition:all .25s ease;-webkit-tap-highlight-color:transparent}
.pref-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;color:rgba(255,255,255,.9);transition:all .3s;border:2px solid transparent;position:relative}
.pref-dot::after{content:'';position:absolute;inset:-4px;border-radius:50%;border:1px solid transparent;transition:.3s}
.pref-node:hover .pref-dot,.pref-node.active .pref-dot{transform:scale(1.3);border-color:rgba(255,255,255,.3);box-shadow:0 0 20px var(--node-color,rgba(201,168,76,.4))}
.pref-node:hover .pref-dot::after,.pref-node.active .pref-dot::after{border-color:rgba(255,255,255,.1);inset:-8px}
.pref-label{position:absolute;top:100%;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:.55rem;color:var(--txd);margin-top:2px;pointer-events:none;transition:.2s;text-align:center;line-height:1.2}
.pref-node:hover .pref-label,.pref-node.active .pref-label{color:var(--txb)}

/* Region colors */
.region-hokkaido_tohoku .pref-dot{background:rgba(123,47,247,.5);--node-color:rgba(123,47,247,.5)}
.region-kanto .pref-dot{background:rgba(247,160,47,.5);--node-color:rgba(247,160,47,.5)}
.region-chubu .pref-dot{background:rgba(47,123,247,.5);--node-color:rgba(47,123,247,.5)}
.region-kinki .pref-dot{background:rgba(247,47,47,.5);--node-color:rgba(247,47,47,.5)}
.region-chugoku .pref-dot{background:rgba(47,247,123,.4);--node-color:rgba(47,247,123,.5)}
.region-shikoku .pref-dot{background:rgba(247,200,47,.5);--node-color:rgba(247,200,47,.5)}
.region-kyushu_okinawa .pref-dot{background:rgba(247,47,180,.5);--node-color:rgba(247,47,180,.5)}

/* POPUP */
/* POPUP */
.popup-overlay{position:fixed;inset:0;z-index:200;background:rgba(6,6,14,.85);backdrop-filter:blur(6px);display:none;align-items:flex-end;justify-content:center;padding:0}
@media(min-width:640px){.popup-overlay{align-items:center;padding:1rem}}
.popup-overlay.show{display:flex}
.popup{background:var(--bg2);border:1px solid rgba(201,168,76,.15);border-radius:14px 14px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:1.2rem;position:relative;animation:slideUp .3s ease-out}
@media(min-width:640px){.popup{border-radius:14px;max-width:98vw;width:auto;animation:popIn .3s ease-out}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.popup-close{position:absolute;top:.8rem;right:.8rem;background:0 0;border:none;color:var(--txd);font-size:1.2rem;cursor:pointer;width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:.2s}
.popup-close:hover{background:rgba(255,255,255,.05);color:var(--txb)}
.popup-header{margin-bottom:1.2rem;padding-right:2rem}
.popup-pref{font-family:'Zen Old Mincho',serif;font-size:1.6rem;color:var(--txb);font-weight:700}
.popup-pref-sub{font-size:.75rem;color:var(--txd);font-family:'Cormorant Garamond',serif}
.popup-kingdom{font-size:.7rem;color:var(--goldd);margin-top:.2rem;letter-spacing:.08em}
.popup-meta{font-size:.65rem;color:var(--txd);margin-top:.3rem;line-height:1.6}
.popup-question{font-size:.8rem;color:var(--txd);font-style:italic;margin:1rem 0;padding:.8rem;border-left:2px solid rgba(201,168,76,.2);background:rgba(255,255,255,.02);border-radius:0 6px 6px 0}

/* WORLD LINE STORY CARDS */
.wl-stories{display:flex;flex-direction:column;gap:.6rem}
@media(min-width:640px){.wl-stories{flex-direction:row;gap:.7rem}}
.wl-story{border-radius:8px;overflow:hidden;cursor:pointer;transition:.3s;border:1px solid rgba(255,255,255,.04);background:var(--bg);display:flex;flex-direction:row;align-items:center}
@media(min-width:640px){.wl-story{flex-direction:column;min-width:160px;flex:1}}
.wl-story:hover{border-color:rgba(201,168,76,.2);box-shadow:0 4px 16px rgba(0,0,0,.3)}
@media(min-width:640px){.wl-story:hover{transform:translateY(-2px)}}
/* モバイル: 横長レイアウト */
.wl-story-img{width:80px;height:80px;object-fit:cover;display:block;flex-shrink:0}
@media(min-width:640px){.wl-story-img{width:100%;height:auto;aspect-ratio:3/4}}
.wl-story-fallback{width:80px;height:80px;display:flex;align-items:center;justify-content:center;font-family:'Zen Old Mincho',serif;font-size:1.2rem;color:rgba(255,255,255,.06);flex-shrink:0}
@media(min-width:640px){.wl-story-fallback{width:100%;aspect-ratio:3/4}}
.wl-story-info{padding:.5rem .7rem;flex:1;text-align:left}
@media(min-width:640px){.wl-story-info{padding:.4rem .3rem;text-align:center}}
.wl-story-dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:.3rem;vertical-align:middle}
.wl-story-name{font-size:.65rem;color:var(--txd);vertical-align:middle}
@media(min-width:640px){.wl-story-name{font-size:.55rem}}
.wl-story-title{font-size:.7rem;color:var(--tx);margin-top:.2rem;line-height:1.4}
@media(min-width:640px){.wl-story-title{display:none}}

/* LEGEND */
.legend{position:fixed;bottom:.8rem;left:50%;transform:translateX(-50%);z-index:50;display:flex;gap:.5rem;padding:.4rem .8rem;background:rgba(6,6,14,.9);backdrop-filter:blur(10px);border-radius:20px;border:1px solid rgba(255,255,255,.04);flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:.25rem;font-size:.55rem;color:var(--txd)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* MOBILE */
@media(max-width:640px){
.map-wrap{padding:.5rem;margin-top:3rem}
.pref-dot{width:22px;height:22px;font-size:.4rem}
.pref-label{font-size:.45rem}
.popup{padding:1rem}
.popup-pref{font-size:1.3rem}
.wl-story-name{font-size:.6rem}
.legend{gap:.3rem;padding:.3rem .6rem;bottom:.5rem}.legend-item{font-size:.5rem}
.topbar{padding:.4rem .5rem}
}
@media(min-width:641px)and(max-width:1024px){
.map-wrap{max-width:600px}
}
@media(min-width:1025px){
.pref-dot{width:32px;height:32px;font-size:.55rem}
.pref-label{font-size:.6rem}
}
</style>
</head>

ja:{backPortal:"一覧に戻る",regions:{hokkaido_tohoku:"北海道・東北",kanto:"関東",chubu:"中部",kinki:"近畿",chugoku:"中国",shikoku:"四国",kyushu_okinawa:"九州・沖縄"},readStory:"物語を読む"},
en:{backPortal:"Back to list",regions:{hokkaido_tohoku:"Hokkaido & Tohoku",kanto:"Kanto",chubu:"Chubu",kinki:"Kansai",chugoku:"Chugoku",shikoku:"Shikoku",kyushu_okinawa:"Kyushu & Okinawa"},readStory:"Read Story"},
zh:{backPortal:"返回列表",regions:{hokkaido_tohoku:"北海道・东北",kanto:"关东",chubu:"中部",kinki:"近畿",chugoku:"中国地方",shikoku:"四国",kyushu_okinawa:"九州・冲绳"},readStory:"阅读故事"},
ko:{backPortal:"목록으로",regions:{hokkaido_tohoku:"홋카이도・도호쿠",kanto:"간토",chubu:"주부",kinki:"긴키",chugoku:"주고쿠",shikoku:"시코쿠",kyushu_okinawa:"규슈・오키나와"},readStory:"이야기 읽기"}
};
const WLN={ja:{封印線:"封印線",商都線:"商都線",静律線:"静律線",変革線:"変革線",境界線:"境界線"},en:{封印線:"Seal",商都線:"Trade",静律線:"Zen",変革線:"Revolution",境界線:"Border"},zh:{封印線:"封印",商都線:"商都",静律線:"静律",変革線:"变革",境界線:"境界"},ko:{封印線:"봉인",商都線:"상도",静律線:"정률",変革線:"변혁",境界線:"경계"}};

let CL='ja';
function t(k){return I18N[CL]?.[k]||I18N.ja[k]||k}
function wn(w){return WLN[CL]?.[w]||w}
function psub(n){return CL!=='ja'&&PN[n]?PN[n][CL]:''}
function q(n){return QS[n]?.[CL]||QS[n]?.ja||''}

function setLang(l){
CL=l;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
document.querySelector(`.lang-btn[onclick="setLang('${l}')"]`).classList.add('active');
document.querySelectorAll('[data-i18n]').forEach(e=>{e.textContent=t(e.dataset.i18n)});
buildLegend();
// Re-render labels
document.querySelectorAll('.pref-node').forEach(el=>{
const n=el.dataset.name;
const sub=psub(n);
el.querySelector('.pref-label').innerHTML=n+(sub?`<br><span style="font-size:.45rem;opacity:.6">${sub}</span>`:'');
});
}

function buildMap(){
const c=document.getElementById('mapInner');
let h='';
for(const p of PREFS){
const sub=psub(p.n);
const initial=p.n.charAt(0);
h+=`<div class="pref-node region-${p.r}" data-name="${p.n}" style="left:${p.x}%;top:${p.y}%" onclick="openPref('${p.n}')">
<div class="pref-dot">${initial}</div>
<div class="pref-label">${p.n}${sub?`<br><span style="font-size:.45rem;opacity:.6">${sub}</span>`:''}</div>
</div>`;
}
c.innerHTML=h;
// 地図背景画像を再挿入（innerHTML上書きで消えるため）
const mapImg=document.createElement('img');
mapImg.className='map-bg-img';
mapImg.src='japan_map.png';
mapImg.alt='';
c.insertBefore(mapImg,c.firstChild);
// localStorage の調整値を再適用
const S=localStorage;
const gn=(k,d)=>+(S.getItem('maptune_'+k)??d);
mapImg.style.top=gn('top',-4)+'%';
mapImg.style.left=gn('left',-16)+'%';
mapImg.style.width=gn('w',155)+'%';
mapImg.style.opacity=gn('op',21)/100;
mapImg.style.transform=`rotate(${gn('rot',-6)}deg)`;
mapImg.style.transformOrigin='center center';
}

function buildLegend(){
const regionNames=I18N[CL].regions;
const items=[
{k:"hokkaido_tohoku",c:"rgba(123,47,247,.7)"},
{k:"kanto",c:"rgba(247,160,47,.7)"},
{k:"chubu",c:"rgba(47,123,247,.7)"},
{k:"kinki",c:"rgba(247,47,47,.7)"},
{k:"chugoku",c:"rgba(47,247,123,.6)"},
{k:"shikoku",c:"rgba(247,200,47,.7)"},
{k:"kyushu_okinawa",c:"rgba(247,47,180,.7)"}
];
let h='';
for(const i of items){
h+=`<div class="legend-item"><div class="legend-dot" style="background:${i.c}"></div>${regionNames[i.k]}</div>`;
}
document.getElementById('legend').innerHTML=h;
}

function openPref(name){
const p=PREFS.find(x=>x.n===name);if(!p)return;
const sub=psub(name);
const question=q(name);
let wlHtml='';
for(const w of WLS){
const rch=String(Math.floor(Math.random()*5)+1).padStart(2,'0');
const thumb=encodeURI(`worldkings_output/${name}_${w}/thumbs/chapter_${rch}.webp`);
const fb1=encodeURI(`worldkings_output/${name}_${w}/images/chapter_${rch}.webp`);
const fb2=encodeURI(`worldkings_output/${name}_${w}/images/chapter_${rch}.png`);
const href=encodeURI(`worldkings_output/${name}_${w}/index.html`);
wlHtml+=`<div class="wl-story" onclick="event.stopPropagation();window.open('${href}','_blank')">
<img class="wl-story-img" src="${thumb}" data-fb1="${fb1}" data-fb2="${fb2}" onerror="if(this.dataset.fb1){var s=this.dataset.fb1;this.dataset.fb1='';this.src=s}else if(this.dataset.fb2){var s=this.dataset.fb2;this.dataset.fb2='';this.src=s}else{this.style.display='none';this.nextElementSibling.style.display='flex'}" loading="lazy">
<div class="wl-story-fallback" style="display:none;background:${WLG[w]}">${name.charAt(0)}</div>
<div class="wl-story-info"><span class="wl-story-dot" style="background:${WLC[w]}"></span><span class="wl-story-name">${wn(w)}</span><div class="wl-story-title">${p.wl[w]||''}</div></div>
</div>`;
}

document.getElementById('popup').innerHTML=`
<button class="popup-close" onclick="closePopup()">✕</button>
<div class="popup-header">
<div class="popup-pref">${name}</div>
${sub?`<div class="popup-pref-sub">${sub}</div>`:''}
<div class="popup-kingdom">${p.k}</div>
<div class="popup-meta">👑 ${p.kg}　🧚 ${p.f}　✨ ${p.s}</div>
</div>
${question?`<div class="popup-question">${question}</div>`:''}
<div class="wl-stories">${wlHtml}</div>`;

document.getElementById('popupOverlay').classList.add('show');

// Highlight node
document.querySelectorAll('.pref-node').forEach(n=>n.classList.remove('active'));
document.querySelector(`.pref-node[data-name="${name}"]`)?.classList.add('active');
}

function closePopup(){
document.getElementById('popupOverlay').classList.remove('show');
document.querySelectorAll('.pref-node').forEach(n=>n.classList.remove('active'));
}

// Keyboard
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup()});

// Init
buildMap();
buildLegend();
const bl=(navigator.language||'').substring(0,2);
if(['en','zh','ko'].includes(bl))setLang(bl);

// ── MAP ALIGNMENT TUNER ──
(function(){
const S=localStorage;
const get=(k,d)=>+(S.getItem('maptune_'+k)??d);
function getImg(){return document.querySelector('.map-bg-img')}
function apply(top,left,w,op,rot){
  const img=getImg(); if(!img)return;
  img.style.top=top+'%';
  img.style.left=left+'%';
  img.style.width=w+'%';
  img.style.opacity=op/100;
  img.style.transform=`rotate(${rot}deg)`;
  img.style.transformOrigin='center center';
}
let top=get('top',-4),left=get('left',-16),w=get('w',155),op=get('op',21),rot=get('rot',-6);
apply(top,left,w,op,rot);

const btn=document.createElement('button');
btn.id='tune-toggle';btn.textContent='⚙ map align';
document.body.appendChild(btn);

const panel=document.createElement('div');
panel.id='tune-panel';
panel.innerHTML=`
<strong style="color:var(--gold)">🗾 Map Align</strong>
<label>top <input type="range" id="t-top" min="-50" max="20" step="1" value="${top}"><span id="v-top">${top}%</span></label>
<label>left <input type="range" id="t-left" min="-60" max="20" step="1" value="${left}"><span id="v-left">${left}%</span></label>
<label>width <input type="range" id="t-w" min="80" max="250" step="1" value="${w}"><span id="v-w">${w}%</span></label>
<label>rotate <input type="range" id="t-rot" min="-30" max="30" step="0.5" value="${rot}"><span id="v-rot">${rot}°</span></label>
<label>opacity <input type="range" id="t-op" min="5" max="60" step="1" value="${op}"><span id="v-op">${op}%</span></label>
<button onclick="['top','left','w','op','rot'].forEach(k=>localStorage.removeItem('maptune_'+k));location.reload()" style="background:none;border:1px solid rgba(255,80,80,.4);color:#f88;border-radius:4px;padding:.2rem .6rem;cursor:pointer;font-size:.6rem">reset</button>
`;
document.body.appendChild(panel);

let open=false;
btn.onclick=()=>{
  open=!open;
  panel.style.display=open?'flex':'none';
  btn.textContent=open?'✕ close':'⚙ map align';
};

const keys=['top','left','w','rot','op'];
keys.forEach(k=>{
  document.getElementById('t-'+k).addEventListener('input',function(){
    const v=+this.value;
    if(k==='top')top=v;
    if(k==='left')left=v;
    if(k==='w')w=v;
    if(k==='op')op=v;
    if(k==='rot')rot=v;
    const unit=k==='rot'?'°':'%';
    document.getElementById('v-'+k).textContent=v+unit;
    apply(top,left,w,op,rot);
    S.setItem('maptune_'+k,v);
  });
});
})();
</script>
</body>
</html>
